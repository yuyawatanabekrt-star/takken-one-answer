<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#174d4d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="宅建一問一答" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="宅建試験対策用の一問一答トレーニングアプリ"
    />
    <title>宅建 一問一答トレーナー</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="icon" href="./assets/icon-192.png" sizes="192x192" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">宅地建物取引士試験</p>
          <h1>一問一答トレーナー</h1>
        </div>
        <div class="summary-strip" aria-label="学習状況">
          <div>
            <span id="studiedCount">0</span>
            <small>回答済み</small>
          </div>
          <div>
            <span id="accuracyRate">0%</span>
            <small>正答率</small>
          </div>
          <div>
            <span id="reviewCount">0</span>
            <small>復習</small>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="workspace" aria-label="問題演習">
          <div class="controls">
            <label>
              年度
              <select id="examFilter"></select>
            </label>
            <label>
              分野
              <select id="categoryFilter"></select>
            </label>
            <label>
              表示
              <select id="modeFilter">
                <option value="all">全問</option>
                <option value="unanswered">未回答</option>
                <option value="review">復習</option>
              </select>
            </label>
            <button id="shuffleButton" class="ghost-button" type="button">シャッフル</button>
            <button id="resetButton" class="ghost-button danger" type="button">記録リセット</button>
          </div>

          <article class="question-panel">
            <div class="question-head">
              <div class="chips">
                <span id="examChip" class="chip">年度</span>
                <span id="categoryChip" class="chip accent">分野</span>
                <span id="topicChip" class="chip muted">論点</span>
              </div>
              <button id="bookmarkButton" class="icon-button" type="button" aria-label="復習に追加">☆</button>
            </div>

            <p id="questionCounter" class="counter">0 / 0</p>
            <p id="questionText" class="question-text"></p>

            <div class="answer-row" aria-label="回答">
              <button id="trueButton" class="answer-button true" type="button">
                <span>○</span>
                正しい
              </button>
              <button id="falseButton" class="answer-button false" type="button">
                <span>×</span>
                誤り
              </button>
            </div>

            <div id="feedback" class="feedback" hidden>
              <p id="feedbackResult" class="feedback-result"></p>
              <p id="feedbackText"></p>
            </div>

            <div class="navigation-row">
              <button id="prevButton" class="ghost-button" type="button">前へ</button>
              <button id="sourceButton" class="ghost-button" type="button">公式PDF</button>
              <button id="nextButton" class="primary-button" type="button">次へ</button>
            </div>
          </article>
        </section>

        <aside class="side" aria-label="補助情報">
          <section class="side-panel">
            <div class="side-title">
              <h2>直近10年</h2>
              <span>公式過去問</span>
            </div>
            <div id="examList" class="exam-list"></div>
          </section>

          <section class="side-panel">
            <div class="side-title">
              <h2>復習リスト</h2>
              <span id="reviewLabel">0問</span>
            </div>
            <div id="reviewList" class="review-list"></div>
          </section>
        </aside>
      </main>

      <footer class="notice">
        公式過去問の原文はRETIO公開PDFで確認できます。アプリ内の問題文は学習用に再構成した○×演習です。
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
